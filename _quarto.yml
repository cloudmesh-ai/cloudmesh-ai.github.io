project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "docs/**/*.qmd"

website:
  title: "Cloudmesh AI"
  
  # Top Navigation Bar
  navbar:
    background: "#f8f9fa"
    collapse: true
    left:
      - href: index.qmd
        text: Home
      - href: docs/manual/versions.qmd
        text: Manual
      - href: docs/manual/developers.qmd  # <--- New Top Entry
        text: Developers

  # Side Navigation Bar
  sidebar:
    - id: main-sidebar
      title: "Navigation"
      style: "docked"
      search: true
      contents:
        - href: index.qmd
          text: Welcome
        - section: "System Manual"
          contents:
            - text: "Versions"
              file: docs/manual/versions.qmd
            - text: "Developers"            # <--- New Sidebar Entry
              file: docs/manual/developers.qmd
        - section: "Components"
          contents:
            - text: "AI Common"
              file: docs/repos/cloudmesh-ai-common.qmd
            - text: "AI Shell"
              file: docs/repos/cloudmesh-ai-shell.qmd
            - text: "AI Git"
              file: docs/repos/cloudmesh-ai-git.qmd
            - text: "AI Multipass"
              file: docs/repos/cloudmesh-ai-multipass.qmd
        - section: "Commands"
          contents:
            - text: "Index"
              file: docs/commands/index.qmd

execute:
  cache: true
  freeze: auto
  daemon: 0

format:
  html:
    theme: 
      light: flatly
      dark: darkly
    code-copy: true
    toc: true
    toc-location: right
    number-sections: true

project-ignore:
  - "ENV14/"
  - "bin/"
  - "build/"
  - "dist/"